{% extends "barber_grid/base.html"%}


{% block content %}

    <ul>
        {% for agendamento in agendamentos %}
        <li>{{ agendamento }}</li>
        {% empty %}
        <div class="sem-agendamento">
            <li>Não há agendamentos adicionados.</li>
            <br>
            <button>Agendar horário</button>
        </div>
        {% endfor %}
    </ul>

{% endblock content%}
