<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Login</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap");
        @import url("https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap");


        *{
        margin: 0;
        padding: 0;
        text-decoration: none;
        font-family: Montserrat;
        box-sizing: border-box;

        }

        .layout{
            display: flex;
            width: 100%;
            min-height: 100vh;
        }
        body {
            background-color: rgb(0, 0, 0);
            flex-direction: column;
            justify-content: center;
            display: flex;
            width: 100%;
            min-height: 100vh;
            background-image: url(fundo-login-barbearia.png);
            background-size: cover;
            object-fit: cover;
            background-position: center;
        
        }

        .lado-esquerdo{
            width: 50%;
            display: flex;
            position: relative;
            min-height: 100vh;
       }
        .container{
            justify-content: start;
            padding: 40px;   /*padding veio pra cá*/
            background-color: rgb(27, 27, 27);
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            width: 520px;
        }

        .lado-direito{
            width: 50%;
            display: flex;
            min-height: 100vh;
            justify-content: center;
            padding-top: 150px;
            align-items: flex-start;    
        }

        .form-group{
            margin-bottom: 8px;
        }

        @media (max-width:768px){
                .layout{
        flex-direction: column;
        }

        .lado-esquerdo,
        .lado-direito{
            width: 100%;
        }

        .lado-esquerdo{
            min-height: 250px;
            justify-content: center;
            align-items: center;
        }

        .lado-direito{
            min-height: auto;
            padding: 30px 20px;
            align-items: center;
        }

        .container{
            width: 90%;
            max-width: 420px; /*equivalento ao form*/
            padding: 25px;
        }

        .form-group{
            padding-bottom: 20px;
            width: 100%;
        }

        .form-group input{
            width: 100%; /*É importante colocar width 100% para que o site não fique com input e o resto fora do forn*/
        }
        form{
            width: 100%;
            
    
        }

        .logo{
            text-align: center;
        }

        .logo p{
            font-size: 22px;
        }

        h2{
            font-size: 36px;
        }

        p,
        footer a,
        button{
            font-size: 18px;
            width: 100%;
        }
                
            }

        .logo{
            padding: 100px;
        }
        
        .logo a{
            color: rgb(255, 238, 143);
            font-family: lato;
            font-size: 54px;
            font-weight: bold;
            white-space: nowrap;
        }

        .logo p{
            color: rgb(223, 208, 125);
            font-size: 22px;
            font-weight: normal;
            margin: 0;
          
        }
        p{
            color: white;
            font-size: 18px;
        }
        
        form{
            /*sem padding pra todos lados*/
            padding: 25px 0px 20px;
            flex-direction: column;
            gap: 10px;
            display: flex;
            width: 100%;
        }

        h2{
            color: white;
            font-size: 50px;
            margin-bottom: 10px;
        }
        .form-group input{
            background-color: rgb(71, 71, 71);
            border-radius: 8px;
            padding: 12px 10px;
            border: none;
            margin-top: 10px;
            width: 100%; /*deixa assim: email 
                                       [     ] */
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .form-group label{
            color: white;
            font-size: 16px;
        }

        button{
            height: 40px;
            text-transform: uppercase;
            border-radius: 15px;
            background-color: rgb(255, 238, 143);
            background-image:  linear-gradient(90deg, rgb(255,238,143), rgb(223, 208, 125));
            cursor: pointer;
            font-size: 24px;

        }
        button:hover{
          
            background-color: rgb(187, 174, 104);
        }

        a{
            color: rgb(255, 238, 143);
        }

        a:hover{
            color: rgb(180, 168, 97);
        }

        footer{
            padding-top: 20px;
            text-align: center;
        }

         footer p{
            text-align: center;
            margin-top: 12px;

        }

        footer a{
            font-size: 24px;
        }

        .lembrar-me{
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="lado-esquerdo">
                <div class="logo">
                  <a href="#">Barber Grid</a>
                    <p>Gerencie seus agendamentos</p>
                    <p>de forma simples e intuitiva.
                    </p>
                </div>
        </div> 
        <div class="lado-direito">
            <div class="container">
                    <h2>Login</h2>
                    <p>Acesse sua conta para continuar</p>
                <form action="#" method="POST">
                        <div class="form-group">
                        <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div> 
                        <div class="form-group">
                            <label for="senha">Senha</label>
                            <input type="password" id="senha" name="senha" required>
                        </div>
                        <div class="lembrar-me">
                            <input type="checkbox">
                            <p>Lembrar-me</p>
                        </div> 
                        <button type="submit">Entrar</button>
                         <p><a href="esqueci-a-senha.html">Esqueceu a senha?</a></p>
                    <footer>
                        <p>Não tem uma conta?</p>
                        <p>
                            <a href="registro.html">Cadastre-se</a>
                        </p>    
                    </footer>
                </form> <!--fechar antes do container-->
            </div> 
        </div>  
    </div>
</body>
</html>
